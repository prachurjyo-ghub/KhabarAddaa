<!DOCTYPE html>

<html lang="en"><head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Admin Login - KhabarAdda</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  
<link rel="stylesheet" href="styles.css"/>

</head>

<body class="page auth-page">
  <header class="auth-header-brand">
    <div class="auth-header-logo">
      <a href="hmp.html">
        <img src="mainlogo svg.svg" alt="Main Logo" />
      </a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card-wrap">
      <div class="auth-card">
        <div class="auth-card-inner auth-card-stack">
          <div class="auth-card-head">
            <h1 class="auth-card-title">
              Admin Login
            </h1>
            <p class="auth-card-subtitle">
              Sign in with admin email and password
            </p>
          </div>

          <form id="admin-login-form" action="" class="auth-form" method="GET">
            <div class="auth-field">
              <label class="auth-label" for="admin-email">
                Email Address
              </label>
              <div class="auth-input-group">
                <input class="auth-input" id="admin-email" name="email" placeholder="admin@restaurant.com" required="" type="email"/>
                <div class="auth-input-line"></div>
              </div>
            </div>

            <div class="auth-field">
              <label class="auth-label" for="admin-password">
                Password
              </label>
              <div class="auth-input-group">
                <input class="auth-input" id="admin-password" name="password" placeholder="••••••••" required="" type="password"/>
                <div class="auth-input-line"></div>
              </div>
            </div>

            <div class="auth-submit-wrap">
              <button class="auth-submit-btn primary-gradient" type="submit">
                Sign In as Admin
              </button>
            </div>
          </form>

          <div class="auth-footer-note">
            <p>
              Want to sign in as a customer?
              <a class="auth-inline-link" href="customerLogin.html">
                Customer Login
              </a>
            </p>
          </div>

        </div>
      </div>
    </div>
  </main>

  <footer class="auth-page-footer">
    <p class="auth-page-footer-copy">
      © 2026 KhabarAdda. All rights reserved.
    </p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="/__/firebase/init.js"></script>
  <script src="app.js"></script>
</body></html>
